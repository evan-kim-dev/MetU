# Render Blueprint — FastAPI backend
# https://render.com/docs/blueprint-spec
#
# After deploy, set CORS_ORIGINS in the Render dashboard to:
#   https://met-u.vercel.app,http://localhost:3000
# Add Vercel preview origins explicitly if the browser calls Render directly.
services:
  - type: web
    name: budgettrip-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENROUTER_HTTP_REFERER
        value: https://met-u.vercel.app
      - key: OPENROUTER_APP_TITLE
        value: MetU
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATA_GO_KR_SERVICE_KEY
        sync: false
      - key: HOTELBEDS_API_KEY
        sync: false
      - key: HOTELBEDS_API_SECRET
        sync: false
      - key: HOTELBEDS_API_BASE
        value: https://api.test.hotelbeds.com
